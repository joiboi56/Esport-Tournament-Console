<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: header('Leaderboard')}"></head>
<body>
<div th:replace="~{fragments/layout :: nav}"></div>
<div class="container mt-4">
    <h2>Tournament Leaderboard</h2>
    <table class="table table-striped">
        <thead>
        <tr>
            <th>#</th>
            <th>Team</th>
            <th>Region</th>
            <th>Wins</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="row, iter : ${leaderboard}">
            <td th:text="${iter.index + 1}"></td>
            <td th:text="${row.teamName}"></td>
            <td th:text="${row.region}"></td>
            <td th:text="${row.wins}"></td>
        </tr>
        </tbody>
    </table>
</div>
<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
