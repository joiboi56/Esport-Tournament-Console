<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: header('Update Match Score')}"></head>
<body>
<div th:replace="~{fragments/layout :: nav}"></div>
<div class="container mt-4">
    <h2>Update Match Result</h2>
    <p>
        <strong th:text="${match.team1.teamName}"></strong> vs
        <strong th:text="${match.team2.teamName}"></strong> —
        <span th:text="${#temporals.format(match.scheduledTime, 'dd MMM yyyy, HH:mm')}"></span>
    </p>
    
    <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>
    
    <form th:action="@{/matches/{id}/update-score(id=${match.matchId})}" method="post">
        <div class="mb-3">
            <label class="form-label">Winner</label>
            <select class="form-select" name="winnerTeamId" required>
                <option th:value="${match.team1.teamId}" th:text="${match.team1.teamName}"></option>
                <option th:value="${match.team2.teamId}" th:text="${match.team2.teamName}"></option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Score (e.g. 2-1)</label>
            <input type="text" class="form-control" name="score" pattern="\d+-\d+" required>
        </div>
        <button type="submit" class="btn btn-success">Save Result</button>
    </form>
</div>
<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
