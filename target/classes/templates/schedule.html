<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: header('Upcoming Matches')}"></head>
<body>
<div th:replace="~{fragments/layout :: nav}"></div>
<div class="container mt-4">
    <h2>Upcoming Match Schedule</h2>
    <table class="table">
        <thead>
        <tr>
            <th>Date/Time</th>
            <th>Team 1</th>
            <th>Team 2</th>
            <th>Action</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="m : ${matches}">
            <td th:text="${#temporals.format(m.scheduledTime, 'dd MMM yyyy, HH:mm')}"></td>
            <td th:text="${m.team1.teamName}"></td>
            <td th:text="${m.team2.teamName}"></td>
            <td>
                <a th:href="@{/matches/{id}/update-score(id=${m.matchId})}"
                   class="btn btn-sm btn-outline-primary">Enter Result</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
