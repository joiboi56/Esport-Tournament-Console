<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: header('Remove Team')}"></head>
<body>
<div th:replace="~{fragments/layout :: nav}"></div>
<div class="container mt-4">
    <h2>Remove Team: <span th:text="${team.teamName}"></span></h2>
    
    <div class="alert alert-warning">
        This will permanently delete the team and its
        <strong th:text="${#lists.size(team.players)}"></strong> registered player(s).
    </div>
    
    <div class="alert alert-danger" th:if="${not #lists.isEmpty(linkedMatches)}">
        <strong>Cannot delete yet:</strong> this team is referenced by
        <span th:text="${#lists.size(linkedMatches)}"></span> match(es) below.
        Remove or reassign these matches first.
        <ul>
            <li th:each="m : ${linkedMatches}"
                th:text="${m.team1.teamName + ' vs ' + m.team2.teamName + ' (' + #temporals.format(m.scheduledTime, 'dd MMM yyyy') + ')'}">
            </li>
        </ul>
    </div>
    
    <h5>Roster</h5>
    <ul>
        <li th:each="p : ${team.players}"
            th:text="${p.gameHandle + ' — ' + p.inGameRole}"></li>
    </ul>
    
    <form th:action="@{/teams/{id}/delete(id=${team.teamId})}" method="post">
        <button type="submit" class="btn btn-danger"
                th:disabled="${not #lists.isEmpty(linkedMatches)}">
            Confirm Delete
        </button>
        <a th:href="@{/teams}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
