<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register Team</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="esports-body">

<div th:replace="fragments/nav :: nav"></div>

<section class="esports-hero text-center">
    <h1>REGISTER YOUR TEAM</h1>
    <p>Assemble your squad. Compete. Win.</p>
</section>

<div class="container py-5">
    <div class="row g-4">
        <div class="col-12">
            <div class="form-card">

                <h3 class="section-title">Team Information</h3>

                <form th:action="@{/teams/register}" th:object="${team}" method="post">

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Team Name</label>
                            <input type="text" class="form-control gaming-input"
                                   th:field="*{teamName}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Region</label>
                            <select class="form-select gaming-input" th:field="*{region}" required>
                                <option value="">Choose region</option>
                                <option value="SEA">SEA</option>
                                <option value="EU">EU</option>
                                <option value="NA">NA</option>
                            </select>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Captain Name</label>
                        <input type="text" class="form-control gaming-input"
                               th:field="*{captainName}" required>
                    </div>

                    <hr>

                    <h3 class="section-title">Player Roster</h3>

                    <div class="table-responsive">
                        <table class="table roster-table align-middle">
                            <thead>
                            <tr>
                                <th>#</th>
                                <th>Game Handle</th>
                                <th>Role</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="player, iter : *{players}">
                                <td th:text="${iter.index + 1}"></td>
                                <td>
                                    <input type="text" class="form-control gaming-input"
                                           th:field="*{players[__${iter.index}__].gameHandle}" required>
                                </td>
                                <td>
                                    <select class="form-select gaming-input"
                                            th:field="*{players[__${iter.index}__].inGameRole}" required>
                                        <option value="">Select role</option>
                                        <option value="Top">Top</option>
                                        <option value="Jungle">Jungle</option>
                                        <option value="Mid">Mid</option>
                                        <option value="ADC">ADC</option>
                                        <option value="Support">Support</option>
                                        <option value="Entry">Entry</option>
                                        <option value="Sniper">Sniper</option>
                                        <option value="Coach">Coach</option>
                                    </select>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>

                    <div class="row mt-4">
                        <div class="col-md-7">
                            <button type="submit" class="btn register-btn w-100">
                                Register Team
                            </button>
                        </div>
                        <div class="col-md-5 mt-2 mt-md-0">
                            <a th:href="@{/teams}" class="btn cancel-btn w-100">
                                Cancel
                            </a>
                        </div>
                    </div>

                </form>
            </div>
        </div>
    </div>
</div>

<div th:replace="fragments/footer :: footer"></div>

</body>
</html>
