

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Delete Team</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="esports-body">

<div th:replace="fragments/nav :: nav"></div>

<section class="esports-hero text-center">
    <h1>DELETE TEAM</h1>
    <p>Remove a registered squad from the tournament.</p>
</section>

<div class="container py-5">

    <div class="form-card">

        <h2 class="section-title text-danger">
            Delete Team:
            <span th:text="${team.teamName}"></span>
        </h2>

        <div class="reminder-box mb-4">
            <h5>Warning</h5>
            <p class="mb-0">
                This action will permanently delete this team and all registered players.
            </p>
        </div>

        <div class="row mb-4">

            <div class="col-md-4">
                <label class="form-label">Team Name</label>
                <div class="gaming-input p-3">
                    <span th:text="${team.teamName}"></span>
                </div>
            </div>

            <div class="col-md-4">
                <label class="form-label">Region</label>
                <div class="gaming-input p-3">
                    <span th:text="${team.region}"></span>
                </div>
            </div>

            <div class="col-md-4">
                <label class="form-label">Captain</label>
                <div class="gaming-input p-3">
                    <span th:text="${team.captainName}"></span>
                </div>
            </div>

        </div>

        <h3 class="section-title">Player Roster</h3>

        <div class="table-responsive mb-4">
            <table class="table roster-table">
                <thead>
                <tr>
                    <th>#</th>
                    <th>Game Handle</th>
                    <th>Role</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="p, stat : ${team.players}">
                    <td class="player-number"
                        th:text="${stat.count}">
                    </td>

                    <td th:text="${p.gameHandle}"></td>

                    <td th:text="${p.inGameRole}"></td>
                </tr>
                </tbody>
            </table>
        </div>

        <div class="alert alert-danger"
             th:if="${not #lists.isEmpty(linkedMatches)}">

            <h5 class="fw-bold">
                Team Cannot Be Deleted
            </h5>

            <p>
                This team is currently linked to
                <span th:text="${#lists.size(linkedMatches)}"></span>
                scheduled match(es).
            </p>

            <ul>
                <li th:each="m : ${linkedMatches}"
                    th:text="${m.team1.teamName + ' vs ' + m.team2.teamName + ' - ' + #temporals.format(m.scheduledTime, 'dd MMM yyyy')}">
                </li>
            </ul>

        </div>

        <form th:action="@{/teams/{id}/delete(id=${team.teamId})}"
              method="post">

            <div class="row">

                <div class="col-md-6 mb-2">
                    <button type="submit"
                            class="btn btn-danger w-100"
                            style="height:56px;font-weight:900;"
                            th:disabled="${not #lists.isEmpty(linkedMatches)}">
                        CONFIRM DELETE
                    </button>
                </div>

                <div class="col-md-6">
                    <a th:href="@{/teams}"
                       class="btn cancel-btn w-100">
                        CANCEL
                    </a>
                </div>

            </div>

        </form>

    </div>

</div>

<div th:replace="fragments/footer :: footer"></div>

</body>
</html>
