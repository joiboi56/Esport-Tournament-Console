<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Delete Team</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="fragments/nav :: nav"></div>

<div class="container mt-4">
    <div class="card shadow p-4">
        <h2 class="text-danger">
            Delete Team: <span th:text="${team.teamName}"></span>
        </h2>

        <div class="alert alert-warning mt-3">
            This action will permanently delete this team and its players.
        </div>

        <h4>Team Details</h4>
        <p><strong>Team Name:</strong> <span th:text="${team.teamName}"></span></p>
        <p><strong>Region:</strong> <span th:text="${team.region}"></span></p>
        <p><strong>Captain:</strong> <span th:text="${team.captainName}"></span></p>

        <h4 class="mt-4">Roster</h4>
        <ul class="list-group mb-4">
            <li class="list-group-item" th:each="p : ${team.players}">
                <span th:text="${p.gameHandle}"></span>
                -
                <span th:text="${p.inGameRole}"></span>
            </li>
        </ul>

        <div class="alert alert-danger" th:if="${not #lists.isEmpty(linkedMatches)}">
            <strong>Cannot delete this team.</strong>
            This team is linked to
            <span th:text="${#lists.size(linkedMatches)}"></span>
            match(es).

            <ul class="mt-2">
                <li th:each="m : ${linkedMatches}"
                    th:text="${m.team1.teamName + ' vs ' + m.team2.teamName + ' - ' + #temporals.format(m.scheduledTime, 'dd MMM yyyy')}">
                </li>
            </ul>
        </div>

        <form th:action="@{/teams/{id}/delete(id=${team.teamId})}" method="post">
            <button type="submit"
                    class="btn btn-danger"
                    th:disabled="${not #lists.isEmpty(linkedMatches)}">
                Confirm Delete
            </button>

            <a th:href="@{/teams}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</div>

<div th:replace="fragments/footer :: footer"></div>

</body>
</html>
