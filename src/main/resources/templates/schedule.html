<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Upcoming Matches</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="esports-body">

<div th:replace="fragments/nav :: nav"></div>

<section class="esports-hero text-center">
    <h1>UPCOMING MATCHES</h1>
    <p>Prepare for the next battles in the tournament arena.</p>
</section>

<div class="container py-5">

    <div class="form-card">

        <div class="text-center mb-4">
            <h2 class="section-title">
                Match Schedule
            </h2>

            <p class="text-secondary">
                View scheduled matches and enter results when battles are completed.
            </p>
        </div>

        <div class="match-list">

            <div class="match-card"
                 th:each="m : ${matches}">

                <div class="match-time">
                    <span th:text="${#temporals.format(m.scheduledTime, 'dd MMM yyyy')}"></span>
                    <small th:text="${#temporals.format(m.scheduledTime, 'HH:mm')}"></small>
                </div>

                <div class="match-teams">

                    <div class="match-team">
                        <h4 th:text="${m.team1.teamName}"></h4>
                    </div>

                    <div class="versus-box">
                        VS
                    </div>

                    <div class="match-team text-end">
                        <h4 th:text="${m.team2.teamName}"></h4>
                    </div>

                </div>

                <div class="match-action" th:if="${session.loggedUser != null and session.loggedUser.role.name() == 'ADMIN'}">
                    <a th:href="@{/matches/{id}/update-score(id=${m.matchId})}"
                       class="btn match-btn">
                        Enter Result
                    </a>
                </div>

            </div>

            <div class="empty-match-box"
                 th:if="${#lists.isEmpty(matches)}">
                <h5>No upcoming matches available.</h5>
                <p>New battles will appear here once they are scheduled.</p>
            </div>

        </div>

    </div>

</div>

<div th:replace="fragments/footer :: footer"></div>

</body>
</html>
