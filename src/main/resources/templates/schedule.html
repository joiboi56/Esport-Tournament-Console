<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Upcoming Matches</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="fragments/nav :: nav"></div>

<div class="container mt-4">
    <div class="card shadow p-4">
        <h2 class="mb-3">Upcoming Match Schedule</h2>

        <table class="table table-bordered table-hover">
            <thead class="table-dark">
            <tr>
                <th>Date / Time</th>
                <th>Team 1</th>
                <th>Team 2</th>
                <th>Action</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="m : ${matches}">
                <td th:text="${#temporals.format(m.scheduledTime, 'dd MMM yyyy, HH:mm')}"></td>
                <td th:text="${m.team1.teamName}"></td>
                <td th:text="${m.team2.teamName}"></td>
                <td>
                    <a th:href="@{/matches/{id}/update-score(id=${m.matchId})}"
                       class="btn btn-sm btn-primary">
                        Enter Result
                    </a>
                </td>
            </tr>
            </tbody>
        </table>

        <div class="alert alert-info" th:if="${#lists.isEmpty(matches)}">
            No upcoming matches available.
        </div>
    </div>
</div>

<div th:replace="fragments/footer :: footer"></div>

</body>
</html>
