
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Leaderboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="esports-body">

<div th:replace="fragments/nav :: nav"></div>

<section class="esports-hero text-center">
    <h1>LEADERBOARD</h1>
    <p>The strongest squads rise to the top.</p>
</section>

<div class="container py-5">

    <div class="form-card">

        <h2 class="section-title text-center mb-4">
            Tournament Rankings
        </h2>

        <div class="leaderboard-list">

            <div class="leaderboard-row"
                 th:each="row, iter : ${leaderboard}"
                 th:classappend="${iter.index == 0} ? ' rank-first' : (${iter.index == 1} ? ' rank-second' : (${iter.index == 2} ? ' rank-third' : ''))">

                <div class="rank-box">
                    <span th:text="${iter.index + 1}"></span>
                </div>

                <div class="team-info">
                    <h4 th:text="${row.teamName}"></h4>
                    <p th:text="${row.region}"></p>
                </div>

                <div class="wins-box">
                    <span th:text="${row.wins}"></span>
                    <small>Wins</small>
                </div>

            </div>

            <div class="text-center py-5"
                 th:if="${#lists.isEmpty(leaderboard)}">
                <h5>No leaderboard data available.</h5>
            </div>

        </div>

    </div>

</div>

<div th:replace="fragments/footer :: footer"></div>

</body>
</html>
