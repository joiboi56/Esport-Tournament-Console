<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Registered Teams</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="esports-body">

<div th:replace="fragments/nav :: nav"></div>

<section class="esports-hero text-center">
  <h1>REGISTERED TEAMS</h1>
  <p>Manage all teams participating in the tournament.</p>
</section>

<div class="container py-5">

  <div class="form-card">

    <div class="d-flex justify-content-between align-items-center mb-4">
      <div>
        <h2 class="section-title mb-1">
          Tournament Teams
        </h2>

        <small class="text-secondary">
          Registered squads competing in the championship
        </small>
      </div>

      <a th:href="@{/teams/register}"
         class="btn register-btn px-4">
        + Register New Team
      </a>
    </div>

    <div class="table-responsive">

      <table class="table roster-table align-middle">

        <thead>
        <tr>
          <th>ID</th>
          <th>Team Name</th>
          <th>Region</th>
          <th>Captain</th>
          <th>Action</th>
        </tr>
        </thead>

        <tbody>

        <tr th:if="${#lists.isEmpty(teams)}">
          <td colspan="5" class="text-center py-5">
            <h5>No teams registered yet</h5>
            <p class="text-secondary">
              Register a team to begin the tournament.
            </p>
          </td>
        </tr>

        <tr th:each="team : ${teams}">

          <td class="player-number"
              th:text="${team.teamId}">
          </td>

          <td class="text-light">
            <strong th:text="${team.teamName}"></strong>
          </td>

          <td>
                        <span class="badge region-badge"
                              th:text="${team.region}">
                        </span>
          </td>

          <td class="text-light"
              th:text="${team.captainName}">
          </td>

          <td>
            <a class="btn delete-btn"
               th:if="${session.loggedUser != null and session.loggedUser.role.name() == 'ADMIN'}"
               th:href="@{/teams/{id}/delete(id=${team.teamId})}">
              Delete
            </a>
          </td>

        </tr>

        </tbody>

      </table>

    </div>

    <div class="mt-4 text-center">
      <p class="text-secondary mb-0">
        🎮 Compete. Conquer. Champion.
      </p>
    </div>

  </div>

</div>

<div th:replace="fragments/footer :: footer"></div>

</body>
</html>
