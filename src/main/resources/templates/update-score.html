<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Update Match Result</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="esports-body">

<div th:replace="fragments/nav :: nav"></div>

<section class="esports-hero text-center">
    <h1>MATCH RESULT</h1>
    <p>Record the outcome of an epic showdown.</p>
</section>

<div class="container py-5">

    <div class="form-card">

        <h2 class="section-title text-center mb-4">
            Update Match Result
        </h2>

        <div class="alert alert-danger"
             th:if="${errorMessage}"
             th:text="${errorMessage}">
        </div>

        <!-- Match Display -->
        <div class="match-preview mb-5">

            <div class="team-display">
                <h3 th:text="${match.team1.teamName}"></h3>
            </div>

            <div class="versus-box">
                VS
            </div>

            <div class="team-display">
                <h3 th:text="${match.team2.teamName}"></h3>
            </div>

        </div>

        <div class="text-center mb-4">
            <span class="match-date">
                <strong>Scheduled:</strong>
                <span th:text="${#temporals.format(match.scheduledTime,'dd MMM yyyy, HH:mm')}"></span>
            </span>
        </div>

        <form th:action="@{/matches/{id}/update-score(id=${match.matchId})}"
              method="post">

            <div class="mb-4">
                <label class="form-label">
                    Winning Team
                </label>

                <select class="form-select gaming-input"
                        name="winnerTeamId"
                        required>

                    <option value="">
                        Select Winner
                    </option>

                    <option th:value="${match.team1.teamId}"
                            th:text="${match.team1.teamName}">
                    </option>

                    <option th:value="${match.team2.teamId}"
                            th:text="${match.team2.teamName}">
                    </option>

                </select>
            </div>

            <div class="mb-4">
                <label class="form-label">
                    Final Score
                </label>

                <input type="text"
                       class="form-control gaming-input"
                       name="score"
                       placeholder="Example: 2-1"
                       pattern="\d+-\d+"
                       required>

                <small class="text-secondary">
                    Enter the score in the format 2-1 or 3-0.
                </small>
            </div>

            <div class="d-flex gap-3">

                <button type="submit"
                        class="btn register-btn flex-fill">
                    Save Result
                </button>

                <a th:href="@{/matches/upcoming}"
                   class="btn cancel-btn flex-fill">
                    Cancel
                </a>

            </div>

        </form>

    </div>

</div>

<div th:replace="fragments/footer :: footer"></div>

</body>
</html>
