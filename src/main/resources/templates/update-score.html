<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Update Match Score</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="fragments/nav :: nav"></div>

<div class="container mt-4">
    <div class="card shadow p-4">
        <h2>Update Match Result</h2>

        <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

        <p class="mt-3">
            <strong th:text="${match.team1.teamName}"></strong>
            vs
            <strong th:text="${match.team2.teamName}"></strong>
        </p>

        <p>
            Match Time:
            <span th:text="${#temporals.format(match.scheduledTime, 'dd MMM yyyy, HH:mm')}"></span>
        </p>

        <form th:action="@{/matches/{id}/update-score(id=${match.matchId})}" method="post">

            <div class="mb-3">
                <label class="form-label">Winner</label>
                <select class="form-select" name="winnerTeamId" required>
                    <option value="">Choose Winner</option>
                    <option th:value="${match.team1.teamId}" th:text="${match.team1.teamName}"></option>
                    <option th:value="${match.team2.teamId}" th:text="${match.team2.teamName}"></option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Score</label>
                <input type="text"
                       class="form-control"
                       name="score"
                       placeholder="Example: 2-1"
                       pattern="\d+-\d+"
                       required>
                <small class="text-muted">Use format like 2-1 or 3-0.</small>
            </div>

            <button type="submit" class="btn btn-success">Save Result</button>
            <a th:href="@{/matches/upcoming}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</div>

<div th:replace="fragments/footer :: footer"></div>

</body>
</html>
