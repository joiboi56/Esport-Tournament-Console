<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="esports-body">

<div class="container py-5" style="max-width: 450px;">
    <div class="form-card">

        <h2 class="section-title text-center mb-4">Welcome Back</h2>

        <!-- Tab toggle -->
        <ul class="nav nav-pills justify-content-center mb-4" id="authTab">
            <li class="nav-item">
                <button class="nav-link active" id="login-tab" onclick="showTab('login')">Log In</button>
            </li>
            <li class="nav-item">
                <button class="nav-link" id="register-tab" onclick="showTab('register')">Create Account</button>
            </li>
        </ul>

        <!-- Login form -->
        <div id="login-section">
            <form method="post" action="/login">
                <div class="mb-3">
                    <input type="text" name="username" class="form-control" placeholder="Username" required/>
                </div>
                <div class="mb-3">
                    <input type="password" name="password" class="form-control" placeholder="Password" required/>
                </div>
                <button type="submit" class="btn register-btn w-100">Log In</button>
                <p th:if="${error}" th:text="${error}" class="text-danger mt-2 text-center"></p>
            </form>
        </div>

        <!-- Register form -->
        <div id="register-section" style="display:none;">
            <form method="post" action="/register-account">
                <div class="mb-3">
                    <input type="text" name="username" class="form-control" placeholder="Username" required/>
                </div>
                <div class="mb-3">
                    <input type="password" name="password" class="form-control" placeholder="Password" required/>
                </div>
                <div class="mb-3">
                    <input type="password" name="confirmPassword" class="form-control" placeholder="Confirm Password" required/>
                </div>
                <button type="submit" class="btn register-btn w-100">Create Account</button>
                <p th:if="${registerError}" th:text="${registerError}" class="text-danger mt-2 text-center"></p>
                <p th:if="${registerSuccess}" th:text="${registerSuccess}" class="text-success mt-2 text-center"></p>
            </form>
        </div>

    </div>
</div>

<script>
    function showTab(tab) {
        document.getElementById('login-section').style.display    = tab === 'login'    ? 'block' : 'none';
        document.getElementById('register-section').style.display = tab === 'register' ? 'block' : 'none';
        document.getElementById('login-tab').classList.toggle('active',    tab === 'login');
        document.getElementById('register-tab').classList.toggle('active', tab === 'register');
    }

    // If there's a register error/success, stay on register tab
    const hasRegisterMsg = /*[[${registerError != null or registerSuccess != null}]]*/ false;
    if (hasRegisterMsg) showTab('register');
</script>

</body>
</html>
