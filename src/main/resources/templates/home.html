<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="esports-body">

<div th:replace="fragments/nav :: nav"></div>

<section class="esports-hero text-center">
    <h1>WELCOME TO ESPORTS CONSOLE</h1>
    <p>Your tournament hub. Compete. Conquer. Champion.</p>
</section>

<div class="container py-5">
    <div class="form-card">

        <!-- Horizontal countdown bar -->
        <div class="d-flex align-items-center justify-content-center gap-4 flex-wrap mb-4">
            <span class="text-secondary">Registration closes in:</span>
            <div class="d-flex gap-2">
                <div class="text-center">
                    <h3 class="mb-0" id="days">00</h3>
                    <small class="text-secondary">Days</small>
                </div>
                <h3 class="mb-0">:</h3>
                <div class="text-center">
                    <h3 class="mb-0" id="hours">00</h3>
                    <small class="text-secondary">Hours</small>
                </div>
                <h3 class="mb-0">:</h3>
                <div class="text-center">
                    <h3 class="mb-0" id="minutes">00</h3>
                    <small class="text-secondary">Min</small>
                </div>
                <h3 class="mb-0">:</h3>
                <div class="text-center">
                    <h3 class="mb-0" id="seconds">00</h3>
                    <small class="text-secondary">Sec</small>
                </div>
            </div>
            <a href="/teams/register" class="btn register-btn px-4">Register Team</a>
        </div>

        <hr class="border-secondary"/>

        <div class="text-center mt-4">
            <p class="text-secondary">Logged in as: <strong th:text="${role}"></strong></p>
        </div>

    </div>
</div>

<div th:replace="fragments/footer :: footer"></div>

<script>
    // Set your registration deadline here
    const deadline = new Date("2026-07-30T23:59:59");

    function updateCountdown() {
        const now = new Date();
        const diff = deadline - now;

        if (diff <= 0) {
            document.getElementById("days").textContent    = "00";
            document.getElementById("hours").textContent   = "00";
            document.getElementById("minutes").textContent = "00";
            document.getElementById("seconds").textContent = "00";
            return;
        }

        document.getElementById("days").textContent    = String(Math.floor(diff / 86400000)).padStart(2, "0");
        document.getElementById("hours").textContent   = String(Math.floor((diff % 86400000) / 3600000)).padStart(2, "0");
        document.getElementById("minutes").textContent = String(Math.floor((diff % 3600000) / 60000)).padStart(2, "0");
        document.getElementById("seconds").textContent = String(Math.floor((diff % 60000) / 1000)).padStart(2, "0");
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);
</script>

</body>
</html>
